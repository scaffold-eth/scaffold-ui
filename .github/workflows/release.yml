name: Release

on:
  push:
    branches:
      - main
      - release-candidate

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for changesets to create commits and tags
  pull-requests: write # Required for changesets to open/update release PRs

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      # Build only the publishable packages, not the docs/example apps. A package
      # release has no reason to build the docs site, and doing so would drag in
      # Vite 8 / rolldown, whose native binding pnpm's hoisted linker doesn't link
      # on a plain CI install.
      - name: Build packages
        run: pnpm build:packages

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
